name: release-sim

on:
  push:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - name: setup buildx
        uses: docker/setup-buildx-action@v3
      - name: build and export image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          outputs: type=docker,dest=app-image.tar
      - name: compress image
        run: gzip -c app-image.tar > app-image.tar.gz
      - name: upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: app-image.tar.gz
      - name: run docker compose
        run: docker compose up -d --build
      - name: wait for compose to start
        run: sleep 5
      - name: smoke test
        run: curl -fsS http://localhost:8080/health
      - name: save compose logs
        if: always()
        run: docker compose logs &> compose.log || true
      - name: upload compose logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose.log
      - name: cleanup compose
        if: always()
        run: docker compose down -v || true