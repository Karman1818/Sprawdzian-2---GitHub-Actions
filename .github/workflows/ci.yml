name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - name: install deps
        run: composer install --no-interaction --no-progress
      - name: run lint
        run: composer lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: setup php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - name: install deps
        run: composer install --no-interaction --no-progress
      - name: run tests
        run: |
          mkdir -p build
          composer test:junit
      - name: upload report
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: build/junit.xml

  docker_smoke:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - name: build image
        run: docker build -t php-app .
      - name: run container
        run: docker run -d --name test-app -p 8080:8080 php-app
      - name: wait for container to start
        run: sleep 5
      - name: smoke test
        run: curl -fsS http://localhost:8080/health
      - name: save logs
        if: always()
        run: |
          docker logs test-app &> container.log || true
          docker ps -a &> ps.log || true
      - name: upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: |
            container.log
            ps.log
      - name: cleanup
        if: always()
        run: docker rm -f test-app || true